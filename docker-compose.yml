version: '3.8'

services:
  # Daemon: Scrapes AudioBookBay every 60 minutes
  bind-daemon:
    build: .
    image: bind:latest
    container_name: bind-daemon
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - data:/app/data/magnets
      - ./logs:/app/logs
    command: [ "python", "-m", "src.bind", "daemon", "--interval", "60", "--output-dir", "/app/data/magnets" ]

  # RSS Server: Serves Web UI and RSS feed on port 5050
  bind-rss:
    build: .
    image: bind:latest
    container_name: bind-rss
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MAGNETS_DIR=/app/data/magnets
    ports:
      - "5050:5050"
    volumes:
      - data:/app/data/magnets
    command: ["gunicorn", "--workers", "2", "--bind", "0.0.0.0:5050", "--timeout", "30", "src.rss_server:app"]
    depends_on:
      - bind-daemon

volumes:
  data: # Shared volume for magnet files between daemon and RSS server
