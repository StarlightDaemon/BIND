version: '3.8'

services:
  # Daemon: Scrapes AudioBookBay every 60 minutes
  bind-daemon:
    build: .
    image: bind:latest
    container_name: bind-daemon
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - BIND_DB_PATH=/app/data/bind.db
    volumes:
      - data:/app/data
      - ./logs:/app/logs
    # Interval comes from SCRAPE_INTERVAL (env or config.env), not a hardcoded
    # flag — a CLI --interval would override config and the Settings UI (ARCH-6).
    command: [ "python", "-m", "src.bind", "daemon" ]
    healthcheck:
      test: ["CMD", "python", "-m", "src.healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # RSS Server: Serves Web UI and RSS feed on port 5050
  bind-rss:
    build: .
    image: bind:latest
    container_name: bind-rss
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - BIND_DB_PATH=/app/data/bind.db
      # Optional: pin the Flask session key so sessions survive image rebuilds.
      # If unset, a key is auto-generated and saved to /app/data/.secret_key.
      # - FLASK_SECRET_KEY=your_key_here
    ports:
      - "5050:5050"
    volumes:
      - data:/app/data
    command: ["gunicorn", "--workers", "2", "--bind", "0.0.0.0:5050", "--timeout", "30", "src.rss_server:app"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5050/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      - bind-daemon

volumes:
  data: # Shared volume for SQLite database and trackers between daemon and RSS server
